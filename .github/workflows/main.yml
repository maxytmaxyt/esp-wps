name: PlatformIO Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run --environment esp32dev

      - name: Prepare Binary and Environment
        id: prepare
        run: |
          # Version bestimmen (Tag oder Branch)
          VERSION="${{ github.ref_name }}"
          # Sonderzeichen in Dateinamen bereinigen
          VERSION_CLEAN=$(echo $VERSION | sed 's/[^a-zA-Z0-9._-]/_/g')
          
          SRC=".pio/build/esp32dev/firmware.bin"
          DST="wps-display-${VERSION_CLEAN}.bin"

          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            echo "Gefundene Datei: $DST"
            # WICHTIG: Als Output für andere Steps setzen
            echo "bin_path=$DST" >> $GITHUB_OUTPUT
            echo "bin_name=$DST" >> $GITHUB_ENV
          else
            echo "::error::Firmware Datei wurde nicht gefunden!"
            ls -R .pio/build/
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          # Wir nutzen hier den Output vom vorherigen Step
          files: ${{ steps.prepare.outputs.bin_path }}
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## ESP32 Firmware Build
            - Version: ${{ github.ref_name }}
            - Commit: `${{ github.sha }}`
            
            ### Flash-Kommando:
            ```bash
            esptool.py --chip esp32 write_flash -z 0x10000 ${{ steps.prepare.outputs.bin_path }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
