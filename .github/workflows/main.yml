name: PlatformIO Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run --environment esp32dev

      - name: Prepare Binary and Environment
        id: prepare
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_CLEAN=$(echo "$VERSION" | sed 's/[^a-zA-Z0-9._-]/_/g')

          SRC=".pio/build/esp32dev/firmware.bin"
          DST="wps-display-${VERSION_CLEAN}.bin"

          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            echo "bin_path=$DST" >> $GITHUB_OUTPUT
            echo "Firmware bereit: $DST"
          else
            echo "::error::firmware.bin nicht gefunden!"
            ls -R .pio/build/ || true
            exit 1
          fi

      # Für workflow_dispatch ohne Tag: temporären Tag erstellen
      - name: Ensure tag exists (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="dev-$(date +'%Y%m%d-%H%M%S')"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tag for tagged push
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prepare.outputs.bin_path }}
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Release ${{ env.RELEASE_TAG }}"
          body: |
            ## ESP32 WPS Display Firmware – ${{ env.RELEASE_TAG }}

            - Commit: `${{ github.sha }}`

            ### Flash-Kommando
            ```bash
            esptool.py --chip esp32 write_flash -z 0x10000 ${{ steps.prepare.outputs.bin_path }}
            ```
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-rc') || contains(env.RELEASE_TAG, '-beta') || startsWith(env.RELEASE_TAG, 'dev-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
